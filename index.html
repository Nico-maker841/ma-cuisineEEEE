<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frigo NFC Intelligent</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; padding: 20px; color: #333; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #27ae60; margin-bottom: 20px; }
        
        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: #2ecc71; }
        
        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-add { background: #2ecc71; color: white; width: 100%; }
        .btn-nfc { background: #3498db; color: white; margin-bottom: 10px; display: none; } /* Caché si pas supporté */
        
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #f9f9f9; margin-bottom: 10px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #2ecc71; }
        .perime { color: #e74c3c; font-weight: bold; }
        .delete-btn { background: #ff7675; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍎 Mon Stock NFC</h2>
    
    <button id="nfcBtn" class="btn btn-nfc" onclick="scanNFC()">📡 Scanner un Tag NFC</button>

    <div class="input-group">
        <input type="text" id="foodName" placeholder="Nom de l'aliment ou ID Tag">
        <input type="date" id="expDate">
        <button class="btn btn-add" onclick="addFood()">Ajouter au stock</button>
    </div>

    <ul id="foodList"></ul>
</div>

<script>
    // Vérifier si le navigateur supporte le Web NFC
    if ('NDEFReader' in window) {
        document.getElementById('nfcBtn').style.display = 'block';
    }

    document.addEventListener('DOMContentLoaded', displayFoods);

    async function scanNFC() {
        try {
            const reader = new NDEFReader();
            await reader.scan();
            alert("Approchez le tag NFC...");

            reader.onreading = event => {
                const serialNumber = event.serialNumber;
                document.getElementById('foodName').value = "Tag: " + serialNumber;
                alert("Tag détecté avec succès !");
            };
        } catch (error) {
            alert("Erreur NFC : " + error + ". Assurez-vous d'être en HTTPS.");
        }
    }

    function addFood() {
        const name = document.getElementById('foodName').value;
        const date = document.getElementById('expDate').value;

        if(!name || !date) return alert("Remplis le nom et la date !");

        const food = { id: Date.now(), name, date };
        let foods = JSON.parse(localStorage.getItem('myNfcFoods')) || [];
        foods.push(food);
        localStorage.setItem('myNfcFoods', JSON.stringify(foods));

        document.getElementById('foodName').value = '';
        displayFoods();
    }

    function displayFoods() {
        const list = document.getElementById('foodList');
        const foods = JSON.parse(localStorage.getItem('myNfcFoods')) || [];
        const today = new Date().toISOString().split('T')[0];

        list.innerHTML = foods.map(f => `
            <li>
                <div>
                    <strong>${f.name}</strong> <br>
                    <small class="${f.date < today ? 'perime' : ''}">Péremption : ${f.date}</small>
                </div>
                <button class="delete-btn" onclick="deleteFood(${f.id})">Supprimer</button>
            </li>
        `).join('');
    }

    function deleteFood(id) {
        let foods = JSON.parse(localStorage.getItem('myNfcFoods'));
        foods = foods.filter(f => f.id !== id);
        localStorage.setItem('myNfcFoods', JSON.stringify(foods));
        displayFoods();
    }
</script>

</body>
</html>
